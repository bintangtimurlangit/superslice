services:
  superslice:
    build:
      context: .
      dockerfile: Dockerfile
    image: superslice:latest
    container_name: superslice
    ports:
      - "8000:8000"
    environment:
      - SLICE_TIMEOUT=120
      - MAX_FILE_SIZE=104857600
      - CORS_ORIGINS=*
    volumes:
      - uploads:/app/uploads
      - output:/app/output
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  uploads:
  output:
